services:
  - type: web
    name: pulse-backend
    rootDir: backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHANNEL_STUB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TIME_COMPRESSION_FACTOR
        value: "60"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: "production"

  - type: web
    name: pulse-channel-stub
    rootDir: channel-stub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: CRM_RECEIPT_URL
        sync: false
      - key: TIME_COMPRESSION_FACTOR
        value: "60"
